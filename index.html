<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KSOB Podcast Guest Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }

    header {
      background: #1a2744;
      color: white;
      padding: 20px 32px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.75; margin-top: 2px; }

    .controls {
      padding: 14px 32px;
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls label { font-size: 0.85rem; font-weight: 600; color: #495057; }
    .controls select, .controls input {
      padding: 6px 10px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 0.875rem;
      outline: none;
    }
    .controls select:focus, .controls input:focus { border-color: #1a2744; }

    .stats {
      padding: 6px 32px;
      font-size: 0.8rem;
      color: #6c757d;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
    }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    thead th {
      background: #1a2744;
      color: white;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { background: #243260; }
    tbody tr { border-bottom: 1px solid #e9ecef; background: #fff; transition: background 0.1s; }
    tbody tr:hover { background: #f1f3f9; }
    tbody tr.sent-row { background: #f0fff4; }
    tbody td { padding: 9px 14px; font-size: 0.875rem; vertical-align: middle; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-unresponsive   { background: #fff3cd; color: #856404; }
    .badge-onice          { background: #cfe2ff; color: #084298; }
    .badge-sent           { background: #d1e7dd; color: #0a3622; }
    .badge-interested     { background: #e8d5f5; color: #5a1a7a; }
    .badge-reached3       { background: #ffd6a5; color: #7c3a00; }
    .badge-reached1       { background: #ffe8cc; color: #7c3a00; }
    .badge-toreach        { background: #e9ecef; color: #495057; }
    .badge-coordinating   { background: #c3f0d1; color: #0a3622; }
    .badge-other          { background: #e9ecef; color: #495057; }

    .btn {
      padding: 4px 9px;
      border: none;
      border-radius: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-copy { background: #e9ecef; color: #212529; }
    .btn-copy:hover { background: #dee2e6; }
    .btn-copy.copied { background: #d1e7dd; color: #0a3622; }
    .btn-sent { background: #1a2744; color: white; }
    .btn-sent:hover { opacity: 0.85; }
    .btn-sent.is-sent { background: #198754; }
    .btn-email { background: transparent; border: 1px solid #1a2744; color: #1a2744; }
    .btn-email:hover { background: #1a2744; color: white; }

    .actions { display: flex; gap: 4px; align-items: center; flex-wrap: nowrap; }

    /* Email modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 10px;
      padding: 28px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; color: #1a2744; }
    .modal .modal-sub { font-size: 0.8rem; color: #6c757d; margin-bottom: 16px; }
    .modal pre {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 16px;
      font-family: inherit;
      font-size: 0.875rem;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    .btn-close-modal { background: #e9ecef; color: #212529; padding: 7px 14px; }
    .btn-close-modal:hover { background: #dee2e6; }
    .btn-modal-copy { padding: 7px 14px; }

    .empty { text-align: center; padding: 40px; color: #6c757d; }
  </style>
</head>
<body>

<header>
  <h1>Karma School of Business — Podcast Guest Board</h1>
  <p>Outreach tracker · BluWave</p>
</header>

<div class="controls">
  <label>Status:</label>
  <select id="statusFilter">
    <option value="">All</option>
    <option value="To Reach Out">To Reach Out</option>
    <option value="Reached Out (1st Attempt)">Reached Out (1st)</option>
    <option value="Reached Out (3rd Attempt)">Reached Out (3rd)</option>
    <option value="Unresponsive">Unresponsive</option>
    <option value="On Ice">On Ice</option>
    <option value="Interested, but not right now">Interested (not now)</option>
    <option value="Coordinating (w/ Guest)">Coordinating</option>
    <option value="Coordinating / More Info">Coordinating / Info</option>
    <option value="__sent__">Email Sent</option>
  </select>
  <label>Search:</label>
  <input type="text" id="searchInput" placeholder="Name or company..." style="width:200px" />
</div>

<div class="stats" id="stats"></div>

<div class="table-wrap">
<table id="guestTable">
  <thead>
    <tr>
      <th onclick="sortBy('name')"># Name</th>
      <th onclick="sortBy('company')">Company</th>
      <th onclick="sortBy('email')">Email</th>
      <th onclick="sortBy('status')">Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>

<div class="empty" id="emptyMsg" style="display:none">No guests match the current filters.</div>

<!-- Email modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Personalized Email</h2>
    <div class="modal-sub" id="modalSub"></div>
    <pre id="modalBody"></pre>
    <div class="modal-actions">
      <button class="btn btn-copy btn-modal-copy" id="modalCopyBtn" onclick="copyModalEmail()">Copy Email</button>
      <button class="btn btn-close-modal" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

GUESTS.forEach((g, i) => g.id = i);

let sortField = 'status';
let sortAsc = true;
let currentEmailText = '';

// In-memory fallback so Mark Sent works in private/incognito browsers too
let _memSentState = {};

function getSentState() {
  try {
    const stored = JSON.parse(localStorage.getItem('ksob_sent') || '{}');
    _memSentState = stored;
    return stored;
  } catch {
    return {..._memSentState};
  }
}

function saveSentState(s) {
  _memSentState = {...s};
  try { localStorage.setItem('ksob_sent', JSON.stringify(s)); } catch { /* private browsing — memory only */ }
}

function getFirstName(name) {
  if (!name) return 'there';
  const cleaned = name
    .replace(/^\(DM\)\s*/i, '')
    .replace(/^TBD\s*@\s*/i, '')
    .replace(/\s*\([^)]*\)\s*$/, '')
    .trim();
  return cleaned.split(/[\s,]+/)[0] || 'there';
}

function buildEmail(guest) {
  const firstName = getFirstName(guest.name);
  const company = guest.company || 'your firm';
  // Grammatically correct possessive: "Associates'" not "Associates's"
  const possessive = company.endsWith('s') ? `${company}'` : `${company}'s`;
  return `Hi ${firstName},

I help coordinate BluWave's podcast, Karma School of Business (https://www.bluwave.net/podcasts/), and we'd love to invite you on as a guest to feature your insights as well as ${possessive} innovative practices in private equity!

The podcast is hosted by Sean Mooney, BluWave's Founder and CEO, and we've published over 100 episodes featuring senior PE professionals and firm founders. Our goal is to humanize the industry and act as a resource for private equity professionals and other business builders seeking to expand their knowledge and skills.

I've attached an info deck that provides more details on the podcast's mission, key audience, episode engagement, and FAQs.

In the meantime, I'll include some examples of episodes below if you'd like to take a look:
- Pam Hendrickson, Vice Chairman of The Riverside Company and Chairman of the Board of the AIC
- Darren Herman, Managing Director at Bain Capital
- Suzanne Yoon, Founder and Managing Partner at Kinzie Capital.

Let me know if you have any questions or are interested in joining!

Thanks,
Chris`;
}

function badgeClass(status, sent) {
  if (sent) return 'badge-sent';
  const s = (status || '').toLowerCase();
  if (s === 'unresponsive') return 'badge-unresponsive';
  if (s === 'on ice') return 'badge-onice';
  if (s.includes('interested')) return 'badge-interested';
  if (s.includes('3rd')) return 'badge-reached3';
  if (s.includes('1st')) return 'badge-reached1';
  if (s === 'to reach out') return 'badge-toreach';
  if (s.includes('coordinating')) return 'badge-coordinating';
  return 'badge-other';
}

function badgeLabel(status, sent) {
  if (sent) return 'Email Sent';
  return status || '—';
}

function render() {
  const sentState = getSentState();
  const statusFilter = document.getElementById('statusFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  let guests = GUESTS.slice();

  if (statusFilter === '__sent__') {
    guests = guests.filter(g => sentState[g.id]);
  } else if (statusFilter) {
    guests = guests.filter(g => !sentState[g.id] && g.status === statusFilter);
  }

  if (search) {
    guests = guests.filter(g =>
      g.name.toLowerCase().includes(search) ||
      g.company.toLowerCase().includes(search) ||
      g.email.toLowerCase().includes(search)
    );
  }

  const fieldMap = { name: 'name', company: 'company', email: 'email', status: 'status' };
  guests.sort((a, b) => {
    const f = fieldMap[sortField] || 'name';
    const av = a[f] || '', bv = b[f] || '';
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  const emptyMsg = document.getElementById('emptyMsg');

  if (guests.length === 0) {
    emptyMsg.style.display = 'block';
  } else {
    emptyMsg.style.display = 'none';
    guests.forEach((g, idx) => {
      const sentVal = sentState[g.id]; // ISO string or undefined
      const sent = !!sentVal;
      const sentLabel = sent
        ? '✓ Sent ' + new Date(sentVal).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'2-digit'})
        : 'Mark Sent';
      const tr = document.createElement('tr');
      if (sent) tr.className = 'sent-row';
      const rowNum = idx + 1;
      tr.innerHTML = `
        <td><span style="color:#adb5bd;font-size:0.75rem;margin-right:6px">${rowNum}</span><strong>${esc(g.name)}</strong></td>
        <td>${esc(g.company || '—')}</td>
        <td style="font-size:0.8rem;color:#495057">${g.email ? `<a href="mailto:${esc(g.email)}" style="color:inherit">${esc(g.email)}</a>` : '—'}</td>
        <td><span class="badge ${badgeClass(g.status, sent)}">${esc(badgeLabel(g.status, sent))}</span></td>
        <td>
          <div class="actions">
            <button class="btn btn-email" onclick="openEmail(${g.id})">Email</button>
            <button class="btn btn-copy" id="copy-${g.id}" onclick="copyEmail(${g.id})">Copy</button>
            <button class="btn btn-sent ${sent ? 'is-sent' : ''}" onclick="toggleSent(${g.id})">
              ${sentLabel}
            </button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  // Stats
  const total = GUESTS.length;
  const sentCount = GUESTS.filter(g => sentState[g.id]).length;
  const byCounts = {};
  GUESTS.forEach(g => {
    if (!sentState[g.id]) byCounts[g.status] = (byCounts[g.status] || 0) + 1;
  });
  const parts = [
    `${total} total`,
    `${sentCount} sent`,
    ...Object.entries(byCounts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${v} ${k.replace(', but not right now','').replace(' (w/ Guest)','').replace(' Attempt','x')}`),
    `showing ${guests.length}`
  ];
  document.getElementById('stats').textContent = parts.join(' · ');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sortBy(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  render();
}

function openEmail(id) {
  const g = GUESTS.find(x => x.id === id);
  if (!g) return;
  currentEmailText = buildEmail(g);
  document.getElementById('modalTitle').textContent = `Email to ${g.name}`;
  document.getElementById('modalSub').textContent = (g.company || '') + (g.email ? ` · ${g.email}` : '');
  document.getElementById('modalBody').textContent = currentEmailText;
  const btn = document.getElementById('modalCopyBtn');
  btn.textContent = 'Copy Email';
  btn.className = 'btn btn-copy btn-modal-copy';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function copyModalEmail() {
  navigator.clipboard.writeText(currentEmailText).then(() => {
    const btn = document.getElementById('modalCopyBtn');
    btn.textContent = 'Copied!';
    btn.className = 'btn btn-copy copied btn-modal-copy';
    setTimeout(() => { btn.textContent = 'Copy Email'; btn.className = 'btn btn-copy btn-modal-copy'; }, 2000);
  });
}

function copyEmail(id) {
  const g = GUESTS.find(x => x.id === id);
  if (!g) return;
  navigator.clipboard.writeText(buildEmail(g)).then(() => {
    const btn = document.getElementById(`copy-${id}`);
    if (btn) {
      btn.textContent = 'Copied!';
      btn.className = 'btn btn-copy copied';
      setTimeout(() => { btn.textContent = 'Copy'; btn.className = 'btn btn-copy'; }, 2000);
    }
  });
}

function toggleSent(id) {
  const s = getSentState();
  if (s[id]) {
    delete s[id];
  } else {
    s[id] = new Date().toISOString();
  }
  saveSentState(s);
  render();
}

document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('statusFilter').addEventListener('change', render);
document.getElementById('searchInput').addEventListener('input', render);

render();
</script>
