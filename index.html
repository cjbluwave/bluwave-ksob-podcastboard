<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KSOB Podcast Guest Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #212529; }

    header {
      background: #1a2744;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.75; margin-top: 2px; }

    .controls {
      padding: 16px 32px;
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls label { font-size: 0.85rem; font-weight: 600; color: #495057; }
    .controls select, .controls input {
      padding: 6px 10px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 0.875rem;
      outline: none;
    }
    .controls select:focus, .controls input:focus { border-color: #1a2744; }

    .stats {
      padding: 8px 32px;
      font-size: 0.8rem;
      color: #6c757d;
      background: #f8f9fa;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #1a2744;
      color: white;
      padding: 10px 14px;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { background: #243260; }
    tbody tr { border-bottom: 1px solid #e9ecef; background: #fff; transition: background 0.1s; }
    tbody tr:hover { background: #f1f3f9; }
    tbody tr.sent-row { background: #f0fff4; }
    tbody td { padding: 10px 14px; font-size: 0.875rem; vertical-align: middle; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-unresponsive { background: #fff3cd; color: #856404; }
    .badge-onice { background: #cfe2ff; color: #084298; }
    .badge-sent { background: #d1e7dd; color: #0a3622; }
    .badge-other { background: #e9ecef; color: #495057; }

    .btn {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-copy { background: #e9ecef; color: #212529; }
    .btn-copy:hover { background: #dee2e6; }
    .btn-copy.copied { background: #d1e7dd; color: #0a3622; }
    .btn-sent { background: #1a2744; color: white; }
    .btn-sent:hover { opacity: 0.85; }
    .btn-sent.is-sent { background: #198754; }
    .btn-email { background: transparent; border: 1px solid #1a2744; color: #1a2744; }
    .btn-email:hover { background: #1a2744; color: white; }

    .actions { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

    /* Email modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 10px;
      padding: 28px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; color: #1a2744; }
    .modal .modal-sub { font-size: 0.8rem; color: #6c757d; margin-bottom: 16px; }
    .modal pre {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 16px;
      font-family: inherit;
      font-size: 0.875rem;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    .btn-close-modal { background: #e9ecef; color: #212529; }
    .btn-close-modal:hover { background: #dee2e6; }

    .empty { text-align: center; padding: 40px; color: #6c757d; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Karma School of Business — Podcast Guest Board</h1>
    <p>Outreach tracker · BluWave</p>
  </div>
</header>

<div class="controls">
  <label>Filter by Status:</label>
  <select id="statusFilter">
    <option value="">All</option>
    <option value="Unresponsive">Unresponsive</option>
    <option value="On Ice">On Ice</option>
    <option value="Sent">Sent</option>
  </select>
  <label>Search:</label>
  <input type="text" id="searchInput" placeholder="Name or company..." style="width:200px" />
</div>

<div class="stats" id="stats"></div>

<table id="guestTable">
  <thead>
    <tr>
      <th onclick="sortBy('name')">Name</th>
      <th onclick="sortBy('company')">Company</th>
      <th onclick="sortBy('email')">Email</th>
      <th onclick="sortBy('status')">Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div class="empty" id="emptyMsg" style="display:none">No guests match the current filters.</div>

<!-- Email modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Personalized Email</h2>
    <div class="modal-sub" id="modalSub"></div>
    <pre id="modalBody"></pre>
    <div class="modal-actions">
      <button class="btn btn-copy" id="modalCopyBtn" onclick="copyModalEmail()">Copy Email</button>
      <button class="btn btn-close-modal" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
const GUESTS = [
  { name: "TBD @Main Post", company: "Main Post Partners", email: "thyland@mainpostpartners.com", status: "Unresponsive" },
  { name: "Joe Rondinelli", company: "Frontenac", email: "jrondinelli@frontenac.com", status: "Unresponsive" },
  { name: "Nickie Norris", company: "New Heritage Capital", email: "nnorris@newheritagecapital.com", status: "Unresponsive" },
  { name: "Eric Keen", company: "Council Capital", email: "ekeen@councilcapital.com", status: "Unresponsive" },
  { name: "TBD @ Summit Partners", company: "Summit Partners", email: "jgutman@summitpartners.com", status: "Unresponsive" },
  { name: "TBD @ TA Associates", company: "TA Associates", email: "mbenoit@ta.com", status: "Unresponsive" },
  { name: "Thomas Groh", company: "Altus Capital Partners", email: "tgroh@altuscapitalpartners.com", status: "Unresponsive" },
  { name: "Rene Stewart", company: "Vista Equity Partners", email: "rstewart@vistaequitypartners.com", status: "Unresponsive" },
  { name: "Rajeev Amara", company: "Arcline Investment Management", email: "Arcline-JF@joelefrank.com", status: "Unresponsive" },
  { name: "Allison Fiore", company: "The Cortec Group", email: "", status: "On Ice" },
  { name: "Kelly Cornelus", company: "LaSalle Capital & Senior Advisor", email: "kcornelis@lasallecapital.com", status: "On Ice" },
  { name: "Colleen Gurda", company: "Riveter Capital", email: "colleen@rivetercapital.com", status: "On Ice" },
  { name: "Paul Swaney III", company: "Swaney Group Capital", email: "megan@swaneygroup.com", status: "On Ice" },
  { name: "Mitchell Green", company: "Lead Edge Capital", email: "mesposito@moxiegrouppr.com", status: "On Ice" },
  { name: "Matt McLain", company: "Victor Capital Partners", email: "mmclain@victorcapitalpartners.com", status: "On Ice" },
  { name: "Michael Fieldstone", company: "Aterian Investment Partners", email: "mfieldstone@aterianpartners.com", status: "On Ice" },
  { name: "Geri House", company: "Platform Partners", email: "ghouse@platformllc.com", status: "On Ice" },
  { name: "Richard Elder", company: "The Carlyle Group", email: "richard.elder@carlyle.com", status: "On Ice" },
  { name: "Ann Chung", company: "Blackstone Growth", email: "ann.chung@blackstone.com", status: "On Ice" },
  { name: "Jene Elzie", company: "Dunes Point Capital", email: "jene.elzie@dunespointcapital.com", status: "On Ice" },
  { name: "Erik Dykema", company: "Lineage Capital", email: "erik@lineagecap.com", status: "Unresponsive" },
  { name: "TBD @ Aterian Investment", company: "Aterian Investment Partners", email: "cremmel@aterianpartners.com", status: "Unresponsive" },
  { name: "TBD @ Cressey", company: "Cressey & Co.", email: "JMcDonough@cresseyco.com", status: "Unresponsive" },
  { name: "Sarah Hirsch", company: "Shore Capital Partners", email: "shirsch@shorecp.com", status: "On Ice" },
  { name: "TBD @ H.I.G. Capital", company: "H.I.G. Capital", email: "ngrgurev@hig.com", status: "On Ice" },
  { name: "TBD @ Clearlake", company: "Clearlake", email: "jhurson@lambert.com", status: "On Ice" },
  { name: "TBD @ Inverness Graham", company: "Inverness Graham", email: "mmoran@invernessgraham.com", status: "On Ice" },
  { name: "TBD @ IOP", company: "IOP", email: "grichmond@iopfund.com", status: "On Ice" },
  { name: "TBD @ Housatonic Partners", company: "Housatonic Partners", email: "srussell@housatonicpartners.com", status: "On Ice" },
  { name: "TBD @ One Equity", company: "One Equity", email: "david.lippin@oneequity.com", status: "On Ice" },
  { name: "TBD @ Crest Rock", company: "Crest Rock Partners", email: "kdonaghue@crestrockpartners.com", status: "On Ice" },
  { name: "Jody Shechtman", company: "GreyLion", email: "jody@greylion.com", status: "On Ice" },
  { name: "TBD @ GrowthCurve", company: "GrowthCurve Capital", email: "katherine@growthcurvecapital.com", status: "On Ice" },
  { name: "Beau Thomas", company: "Agellus Capital", email: "bthomas@agellus.com", status: "On Ice" },
  { name: "Mara Edgar", company: "The Riverside Company", email: "medgar@RiversideCompany.com", status: "Unresponsive" },
  { name: "TBD @ Serent Capital", company: "Serent Capital", email: "Sam.Whitford@SerentCapital.com", status: "Unresponsive" },
  { name: "Alice Mann", company: "Sentinel Capital Partners", email: "mann@sentinalpartners.com", status: "Unresponsive" },
  { name: "TBD @ Excellere Partners", company: "Excellere Capital", email: "tkelly@excellere.com", status: "On Ice" },
  { name: "TBD @ Investcorp", company: "Investcorp", email: "kfleischer@investcorp.com", status: "Unresponsive" },
  { name: "TBD @ Broad Sky Partners", company: "Broad Sky Partners", email: "jwang@broadskypartners.com", status: "Unresponsive" },
  { name: "TBD @ Prairie Capital", company: "Prairie Capital", email: "tweidaw@prairie-capital.com", status: "Unresponsive" },
  { name: "Kelly Stone", company: "Main Post Partners", email: "kstone@mainpostpartners.com", status: "Unresponsive" },
  { name: "Luke Johnson", company: "Arcline Investment Management", email: "luke@arcline.com", status: "Unresponsive" },
  { name: "Chrisanne Corbett", company: "KPMG Corporate Finance", email: "ccorbett@kpmg.com", status: "Unresponsive" },
  { name: "Andrew Bonanno", company: "Kohlberg & Co.", email: "bonanno@kohlberg.com", status: "Unresponsive" },
  { name: "John Donahue", company: "Windjammer Capital Investors", email: "jdonahue@windjammercapital.com", status: "Unresponsive" },
  { name: "Daniel Lee", company: "Garnett Station Partners", email: "lee@garnettstation.com", status: "Unresponsive" },
  { name: "Ian Mackay", company: "BlackArch Partners", email: "mackay@blackarchpartners.com", status: "Unresponsive" }
];

// Assign stable IDs
GUESTS.forEach((g, i) => g.id = i);

let sortField = 'name';
let sortAsc = true;
let currentEmailText = '';

function getSentState() {
  try { return JSON.parse(localStorage.getItem('ksob_sent') || '{}'); } catch { return {}; }
}
function setSent(id, val) {
  const s = getSentState();
  s[id] = val;
  localStorage.setItem('ksob_sent', JSON.stringify(s));
}

function getFirstName(name) {
  if (!name) return 'there';
  const cleaned = name.replace(/^\(DM\)\s*/i, '').replace(/^TBD\s*@\s*/i, '').trim();
  const parts = cleaned.split(/\s+/);
  return parts[0] || 'there';
}

function buildEmail(guest) {
  const firstName = getFirstName(guest.name);
  const company = guest.company || 'your firm';
  return `Hi ${firstName},

I help coordinate BluWave's podcast, Karma School of Business (https://www.bluwave.net/podcasts/), and we'd love to invite you on as a guest to feature your insights as well as ${company}'s innovative practices in private equity!

The podcast is hosted by Sean Mooney, BluWave's Founder and CEO, and we've published over 100 episodes featuring senior PE professionals and firm founders. Our goal is to humanize the industry and act as a resource for private equity professionals and other business builders seeking to expand their knowledge and skills.

I've attached an info deck that provides more details on the podcast's mission, key audience, episode engagement, and FAQs.

In the meantime, I'll include some examples of episodes below if you'd like to take a look:
- Pam Hendrickson, Vice Chairman of The Riverside Company and Chairman of the Board of the AIC
- Darren Herman, Managing Director at Bain Capital
- Suzanne Yoon, Founder and Managing Partner at Kinzie Capital.

Let me know if you have any questions or are interested in joining!

Thanks,
Chris`;
}

function badgeHtml(status, sent) {
  if (sent) return '<span class="badge badge-sent">Sent</span>';
  if (status === 'Unresponsive') return '<span class="badge badge-unresponsive">Unresponsive</span>';
  if (status === 'On Ice') return '<span class="badge badge-onice">On Ice</span>';
  return `<span class="badge badge-other">${status}</span>`;
}

function render() {
  const sentState = getSentState();
  const statusFilter = document.getElementById('statusFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  let guests = GUESTS.slice();

  if (statusFilter === 'Sent') {
    guests = guests.filter(g => sentState[g.id]);
  } else if (statusFilter) {
    guests = guests.filter(g => !sentState[g.id] && g.status === statusFilter);
  }

  if (search) {
    guests = guests.filter(g =>
      g.name.toLowerCase().includes(search) ||
      (g.company || '').toLowerCase().includes(search)
    );
  }

  guests.sort((a, b) => {
    let av = a[sortField === 'name' ? 'name' : sortField === 'company' ? 'company' : sortField === 'email' ? 'email' : 'status'] || '';
    let bv = b[sortField === 'name' ? 'name' : sortField === 'company' ? 'company' : sortField === 'email' ? 'email' : 'status'] || '';
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  const emptyMsg = document.getElementById('emptyMsg');

  if (guests.length === 0) {
    emptyMsg.style.display = 'block';
  } else {
    emptyMsg.style.display = 'none';
    guests.forEach(g => {
      const sent = !!sentState[g.id];
      const tr = document.createElement('tr');
      if (sent) tr.className = 'sent-row';
      tr.innerHTML = `
        <td><strong>${escHtml(g.name)}</strong></td>
        <td>${escHtml(g.company || '—')}</td>
        <td style="font-size:0.8rem;color:#495057">${g.email ? `<a href="mailto:${escHtml(g.email)}" style="color:inherit">${escHtml(g.email)}</a>` : '—'}</td>
        <td>${badgeHtml(g.status, sent)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-email" onclick="openEmail(${g.id})">View Email</button>
            <button class="btn btn-copy" id="copy-${g.id}" onclick="copyEmail(${g.id})">Copy</button>
            <button class="btn btn-sent ${sent ? 'is-sent' : ''}" id="sent-${g.id}" onclick="toggleSent(${g.id})">
              ${sent ? '✓ Sent' : 'Mark Sent'}
            </button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  // Stats
  const total = GUESTS.length;
  const sentCount = GUESTS.filter(g => sentState[g.id]).length;
  const unresponsive = GUESTS.filter(g => !sentState[g.id] && g.status === 'Unresponsive').length;
  const onIce = GUESTS.filter(g => !sentState[g.id] && g.status === 'On Ice').length;
  document.getElementById('stats').textContent =
    `${total} total guests · ${sentCount} sent · ${unresponsive} unresponsive · ${onIce} on ice · showing ${guests.length}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sortBy(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  render();
}

function openEmail(id) {
  const g = GUESTS.find(x => x.id === id);
  if (!g) return;
  currentEmailText = buildEmail(g);
  document.getElementById('modalTitle').textContent = `Email to ${g.name}`;
  document.getElementById('modalSub').textContent = g.company + (g.email ? ` · ${g.email}` : '');
  document.getElementById('modalBody').textContent = currentEmailText;
  const copyBtn = document.getElementById('modalCopyBtn');
  copyBtn.textContent = 'Copy Email';
  copyBtn.className = 'btn btn-copy';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function copyModalEmail() {
  navigator.clipboard.writeText(currentEmailText).then(() => {
    const btn = document.getElementById('modalCopyBtn');
    btn.textContent = 'Copied!';
    btn.className = 'btn btn-copy copied';
    setTimeout(() => { btn.textContent = 'Copy Email'; btn.className = 'btn btn-copy'; }, 2000);
  });
}

function copyEmail(id) {
  const g = GUESTS.find(x => x.id === id);
  if (!g) return;
  const text = buildEmail(g);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`copy-${id}`);
    if (btn) {
      btn.textContent = 'Copied!';
      btn.className = 'btn btn-copy copied';
      setTimeout(() => { btn.textContent = 'Copy'; btn.className = 'btn btn-copy'; }, 2000);
    }
  });
}

function toggleSent(id) {
  const s = getSentState();
  s[id] = !s[id];
  localStorage.setItem('ksob_sent', JSON.stringify(s));
  render();
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('statusFilter').addEventListener('change', render);
document.getElementById('searchInput').addEventListener('input', render);

render();
</script>
</body>
</html>
